name: Build Updater

# Place this workflow in the mavrog-updater repo (the desktop app), not the
# addon release repo. Tag the updater repo with v* to publish a Windows build.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME
          wails build -ldflags "-X main.AppVersion=$version" -o "MavrogUpdater.exe"

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          name: Mavrog Updater ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: build/bin/MavrogUpdater.exe
